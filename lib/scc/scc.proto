syntax = "proto3";

package scc;

option go_package="./scc";

message LoginRequest {
  string name = 1;
  string password = 2;
}

message GRequest {
  oneof req {
      MeetReq mreq = 1;
      CheckReq creq = 2;
      ImportReq ireq = 3;
      ReportCheckFailedReq freq = 4;
      CustomReq customs = 5;
      SendSloganReq sreq = 6;
  };
}

message CustomReq {
  map<string, string> customs = 1;
}

message MeetReq {
  string MeetID = 1; // 会议 ID
}

message CheckReq {
  string meetID = 1;
  string stations = 2; // DatabaseCheck
  string tables = 3; // DatabaseCheck
}

message ReportCheckFailedReq {
  string meetID = 1;
  string stations = 2;
}

message ImportReq {
  bytes file = 1; // 文件内容
}

// 查询终端参数
message QueryReq {
  oneof req {
    SearchReq sreq = 1;
    SignInReq ireq = 2;
    PersonReq preq = 3;
    QueryTypeReq oreq = 4;
  }
}

message SearchReq {
    string meetID = 1;
    string condition = 2;
    string kind = 3;
}

message SignInReq {
  string meetID = 1;
  string condition = 2;
  string kind = 3;
  string type = 4;
  string size = 5;
  string index = 6;
}

message PersonReq {
  string meetID = 1;
  string personId = 2;
  string leaveCheckin = 3;
}

message QueryTypeReq {
  string meetID = 1;
  string personId = 2;
  string type = 3;
  string size = 4;
  string index = 5;
}


// 下发标语
message SendSloganReq {
  string data = 1;
}

message GResponse {
  int32 code = 1;
  string msg = 2;
  string data = 3;
  string remark = 4;
}

message PushReq {
  string uid = 1;
  int32 timestamp = 2;
}

message PushMsg {
  int32 type = 1;
  string data = 2;
  int64 timestamp = 3;
}

message MetricReq {
  string uid = 1;
  int64 timestamp = 2;
}

// 主控接口
service CtrlApi {
  rpc Ping(GRequest) returns(GResponse);
  //查询会议参数
  rpc QueryNoDatabaseParameters(GRequest) returns(GResponse);
  //查询会议
  rpc QueryMeet(GRequest) returns(GResponse);
  //设置会议
  rpc SetMeet(GRequest) returns(GResponse);
  // 开始会议
  rpc StartMeet(GRequest) returns(GResponse);
  // 结束会议
  rpc EndMeet(GRequest) returns(GResponse);
  // 继续会议
  rpc ContinueMeet(GRequest) returns(GResponse);
  // 登录
  rpc Login(LoginRequest) returns(GResponse);
  // 数据校验
  rpc DatabaseCheck(GRequest) returns(GResponse);
  // 结束数据校验
  rpc EndDatabaseCheck(GRequest) returns(GResponse);
  // 上报报到失败数据
  rpc ReportCheckInFailed(GRequest) returns(GResponse);
  // 导入报到记录
  rpc ImportRecord(GRequest) returns(GResponse);
  // 查询客户端
  rpc QueryClient(GRequest) returns(GResponse);
  // 查寻当前会议
  rpc QueryOnMeet(GRequest) returns(GResponse);
  // 查询会议信息
  rpc QueryMeetInfo(GRequest) returns(GResponse);
}

// 坐席终端 API
service SeatMapApi {
  rpc QueryMapInfo(GRequest) returns(GResponse);
  rpc QueryMapList(GRequest) returns(GResponse);
  rpc Update(GRequest) returns(GResponse);
}

// 查询终端API
service QueryApi {
  rpc cancelCheckIn(QueryReq) returns(GResponse);
  rpc queryPersonCheckInfo(QueryReq) returns(GResponse);
  rpc querySearchInfo(QueryReq) returns(GResponse);
  rpc querySignInInfo(QueryReq) returns(GResponse);
  rpc replenishCheckIn(QueryReq) returns(GResponse);
  rpc photoName(QueryReq) returns(GResponse);
  rpc queryOutPerson(QueryReq) returns(GResponse);
  rpc queryPersonCheckInLog(QueryReq) returns(GResponse);
  rpc queryLeaveCheckinPerson(QueryReq) returns(GResponse);
  rpc cancelLeaveCheckin(QueryReq) returns(GResponse);
}

// 标语接口
service SloganApi {
  rpc send(GRequest) returns(GResponse);
  rpc query(GRequest) returns(GResponse);
  rpc queryCurrentSlog(GRequest) returns(GResponse);
}

//初始化通用Controller
//service CommonApi {
//  rpc subscribe(PushReq) returns (stream PushMsg);
//}

message MetricConfirm {
  int32 code = 1;
  string message = 2;
  string data = 3;
}

message MetricMsg {
  int32 type = 1; // 心跳或数据
  string channel = 2; // 数据频道
  string data = 3;
  int64 timestamp = 4;
}

service MetricApi {
  rpc ping(MetricReq) returns(MetricConfirm);
  rpc subscribeMetrics(MetricReq) returns(stream MetricMsg);
}