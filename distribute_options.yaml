output: dist/

releases:
  - name: linux-x64
    jobs:
      - name: release-linux-x64-zip
        package:
          platform: linux
          target: zip
          build_args:
            release: true

  # 说明：这条只能在 ARM64 的 Linux 环境里运行。
  # 如果你在 x86_64 的 WSL 上执行，会因为 Flutter 的限制而提示不支持交叉编译。
  - name: linux-arm64
    jobs:
      - name: release-linux-arm64-zip
        package:
          platform: linux
          target: zip
          build_args:
            release: true
            # 不在 x86_64 里写 target-platform，避免触发 cross-build 限制。
            # 在 ARM64 Linux 主机上运行时，flutter build linux --release 会自动产出 linux-arm64。


